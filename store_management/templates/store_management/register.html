{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <h2 class="text-center mb-4">Open A New Store</h2>
        
        <div class="card p-4 shadow">
            <h4 class="mb-4">Store Information</h4>
            <form method="post" novalidate>
                {% csrf_token %}
                
                {{ form|crispy }}
                
                <button type="submit" class="btn btn-primary w-100 mt-4">Create Store</button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
