{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .auth-stage { min-height: calc(100vh - 180px); display: grid; place-items: center; padding: 2rem 0; }
    .auth-card { width: min(100%, 460px); background: rgba(30, 30, 47, .76); border: 1px solid rgba(148, 163, 184, .18); border-radius: 8px; padding: 2rem; box-shadow: 0 24px 80px rgba(0, 0, 0, .42); backdrop-filter: blur(18px); }
    .auth-eyebrow { color: #67e8f9; font-size: .76rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    .auth-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 900; margin: .35rem 0 .5rem; color: #f8fafc; }
    .auth-copy { color: #94a3b8; margin-bottom: 1.3rem; }
    .auth-card label { color: #cbd5e1; font-size: .84rem; font-weight: 700; }
    .auth-card .form-control, .auth-card input { background: rgba(15, 23, 42, .92) !important; border: 1px solid rgba(148, 163, 184, .22) !important; color: #f8fafc !important; border-radius: 8px !important; padding: .78rem .9rem; }
    .auth-card .form-control:focus, .auth-card input:focus { border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, .26), 0 0 24px rgba(6, 182, 212, .18) !important; }
    .auth-card .invalid-feedback, .auth-card .alert-danger, .auth-card .text-danger { color: #fca5a5 !important; }
    .auth-primary { width: 100%; border: 0; border-radius: 8px; color: #fff; font-weight: 800; padding: .85rem 1rem; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 52%, #06b6d4 100%); box-shadow: 0 14px 34px rgba(99, 102, 241, .32); }
    .auth-links { display: flex; justify-content: space-between; gap: .75rem; flex-wrap: wrap; margin-top: 1rem; }
    .auth-links a { color: #93c5fd; text-decoration: none; font-weight: 700; }
</style>

<section class="auth-stage">
    <div class="auth-card">
        <div class="auth-eyebrow">Nexus Command Center</div>
        <h1 class="auth-title">Store Manager Login</h1>
        <p class="auth-copy">Access your orders, product catalog, messages, and AI intelligence workspace.</p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="auth-primary mt-3">Log In as Manager</button>
        </form>
        <div class="auth-links">
            <a href="{% url 'store_management:register' %}">Open your store</a>
            <a href="{% url 'store:login' %}">Customer login</a>
        </div>
    </div>
</section>
{% endblock content %}
