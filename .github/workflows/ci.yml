# .github/workflows/ci.yml

name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # This section defines the services (Docker containers) that our job needs.
    services:
      # We give our postgres service a label: 'postgres_ci'
      postgres_ci:
        image: postgres:15
        env:
          POSTGRES_DB: multi_tenant_shop_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        # This is the important part: we map the container's port 5432
        # to a specific port on the host runner, which we can then reference.
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        env:
          DATABASE_NAME: multi_tenant_shop_db
          DATABASE_USER: postgres
          DATABASE_PASSWORD: password
          # --- FINAL FIX ---
          # We now connect to localhost because the 'ports' mapping makes the
          # postgres_ci service available on the runner's localhost.
          DATABASE_HOST: localhost
          # We access the mapped port using the job.services context.
          DATABASE_PORT: ${{ job.services.postgres_ci.ports[5432] }}
          SECRET_KEY: 'a-dummy-secret-key-for-ci'
        run: python manage.py test