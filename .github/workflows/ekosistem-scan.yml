name: EkoSistem Auto-Security-Scan
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
permissions:
  contents: read
jobs:
  ekosistem-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EkoSistem Scan
        run: |
          echo "Triggering EkoSistem automatic audit for $GITHUB_REPOSITORY@$GITHUB_SHA"
          curl -s -X POST https://agent1-data-collector-617724751948.europe-west3.run.app/webhook/push \
            -H "Content-Type: application/json" \
            -d '{"repo_url":"https://github.com/SerhatFiliz/multi_tenant_shop","repo_name":"SerhatFiliz/multi_tenant_shop","user_uid":"sXAsixHMJKPCn5xlRz6q5PhOyt43","github_token":"${{ secrets.GITHUB_TOKEN }}","ref":"${{ github.ref }}","commit_sha":"${{ github.sha }}"}'