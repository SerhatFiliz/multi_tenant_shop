{% extends "base.html" %}
{% load crispy_forms_tags %} 

{% block content %}
<!-- Customer Login Page Container -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <!-- Login Title -->
                    <h2 class="card-title text-center">Customer Login</h2>
                    
                    <!-- Customer Login Form -->
                    <form method="post">
                        {% csrf_token %}
                        <!-- Render the form fields using crispy forms -->
                        {{ form|crispy }}
                        <!-- Submit button for customer authentication -->
                        <button type="submit" class="btn btn-primary w-100 mt-3">Log In</button>
                    </form>
                    
                    <!-- Customer Signup Link -->
                    <div class="text-center mt-3">
                        <a href="{% url 'store:signup' %}">Don't have an account? Sign Up</a>
                    </div>
                    
                    <hr>
                    
                    <!-- START: Store Manager / Tenant Links -->
                    <!-- Provides links to separate Manager access from Customer access -->
                    <div class="text-center mt-3">
                        <p class="mb-2 text-muted">Are you a Store Manager?</p>
                        
                        <!-- Link to the Store Manager Login page (store_management:login) -->
                        <a href="{% url 'store_management:login' %}" class="btn btn-outline-dark btn-sm me-2">
                            Store Manager Login
                        </a>
                        
                        <!-- Link to the public Tenant Registration page (store_management:register) -->
                        <a href="{% url 'store_management:register' %}" class="btn btn-outline-secondary btn-sm">
                            Open a New Store
                        </a>
                    </div>
                    <!-- END: Store Manager / Tenant Links -->

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
